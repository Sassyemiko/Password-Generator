<!DOCTYPE html>
<html>
<head>
    <title>🔐 Secure Password Generator</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        h1 { margin-bottom: 25px; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin: 8px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #ff5252;
        }
        .btn-save {
            background: #4caf50;
        }
        .btn-save:hover {
            background: #45a049;
        }
        .password {
            font-family: 'Courier New', monospace;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 6px;
            margin: 20px 0;
            word-break: break-all;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
        }
        .error { color: #ff9800; }
        .success { color: #4caf50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Secure Password Generator</h1>

        <form method="POST">
            <label for="website">Website:</label>
            <input type="text" id="website" name="website" placeholder="e.g., github.com" value="{{ website }}" required>

            <label for="username">Username / Email:</label>
            <input type="text" id="username" name="username" placeholder="you@example.com" value="{{ username }}" required>

            <label for="length">Password Length (min 5):</label>
            <input type="number" id="length" name="length" min="5" value="{{ length }}" required>

            <div style="margin-top: 20px;">
                <button type="submit" name="action" value="generate" class="btn">Generate Password</button>
                <button type="submit" name="action" value="save" class="btn btn-save">Generate & Save</button>
            </div>
        </form>

        {% if error %}
            <p class="message error">{{ error }}</p>
        {% endif %}

        {% if message %}
            <p class="message success">{{ message }}</p>
        {% endif %}

        {% if password %}
            <h2>Generated Password:</h2>
            <div class="password">{{ password }}</div>
        {% endif %}
    </div>
</body>
</html>
